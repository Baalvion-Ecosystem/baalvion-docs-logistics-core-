version: '3.8'

services:

  # ✅ POSTGRESQL
  postgres:
    image: postgres:15-alpine
    container_name: baalvion-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - baalvion-network

  # ✅ KAFKA
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: baalvion-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - baalvion-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: baalvion-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - baalvion-network

  # ✅ REDIS
  redis:
    image: redis:7-alpine
    container_name: baalvion-redis
    ports:
      - "6379:6379"
    networks:
      - baalvion-network

  # ✅ DOCUMENT VAULT SERVICE
  document-vault-service:
    build:
      context: ../../services/document-vault-service
      dockerfile: Dockerfile
    container_name: document-vault-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/document_vault_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - kafka
    networks:
      - baalvion-network

  # ✅ DOCUMENT GENERATION SERVICE
  document-generation-service:
    build:
      context: ../../services/document-generation-service
      dockerfile: Dockerfile
    container_name: document-generation-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/document_generation_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - kafka
    networks:
      - baalvion-network

  # ✅ DOCUMENT VERSIONING SERVICE
  document-versioning-service:
    build:
      context: ../../services/document-versioning-service
      dockerfile: Dockerfile
    container_name: document-versioning-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/document_versioning_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - kafka
    networks:
      - baalvion-network

  # ✅ OCR PROCESSING SERVICE
  ocr-processing-service:
    build:
      context: ../../services/ocr-processing-service
      dockerfile: Dockerfile
    container_name: ocr-processing-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ocr_processing_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - kafka
    networks:
      - baalvion-network

networks:
  baalvion-network:
    driver: bridge

volumes:
  postgres-data: